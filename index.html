<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>织梦纺 - 移动版</title>
    
    <!-- Tailwind CSS (预构建) -->
    <link rel="stylesheet" href="styles.css">

    <!-- React & ReactDOM (本地) -->
    <script src="vendor/react.production.min.js"></script>
    <script src="vendor/react-dom.production.min.js"></script>
    
    <!-- 表情包数据 -->
    <script src="emoticon-data.js"></script>
    <!-- 气泡皮肤数据 -->
    <script src="bubble-data.js"></script>

    <style>
      /* Mobile App Container Styles */
      body {
        background-color: #f9fafb; /* Default Light BG */
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        overflow: hidden;
        width: 100%;
        height: 100vh;
        transition: background-color 0.3s ease;
      }
      
      body.dark {
        background-color: #030712; /* Dark BG */
      }

      #root {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      /* Custom Scrollbar - Enhanced */
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #9ca3af; border-radius: 3px; }
      .dark ::-webkit-scrollbar-thumb { background: #4b5563; }
      ::-webkit-scrollbar-thumb:hover { background: #6b7280; }
      
      /* Firefox Scrollbar */
      * {
        scrollbar-width: thin;
        scrollbar-color: #9ca3af transparent;
      }
      .dark * {
        scrollbar-color: #4b5563 transparent;
      }
      
      /* Ensure scrollable containers work properly */
      .custom-scrollbar {
        overflow-y: auto !important;
        -webkit-overflow-scrolling: touch;
        touch-action: pan-y;
      }
      
      /* Fix flex layout issues */
      .min-h-0 {
        min-height: 0;
      }
      
      /* Modal content scrolling fix */
      .modal-scroll-container {
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        touch-action: pan-y;
        overscroll-behavior: contain;
      }
      
      .glass-panel { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); }
      .dark .glass-panel { background: rgba(17, 24, 39, 0.9); }
      
      input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
      
      .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
      .text-shadow { text-shadow: 1px 1px 2px rgba(0,0,0,0.8); }
      img { -webkit-user-drag: none; user-select: none; }
      
      /* Mobile grid */
      .mobile-card-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 0.75rem;
      }
      @media (min-width: 768px) {
        .mobile-card-grid {
          grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
          gap: 1rem;
        }
      }
      
      /* Switch Toggle */
      .toggle-checkbox:checked {
        right: 0;
        border-color: #111827;
      }
      .dark .toggle-checkbox:checked {
        border-color: #f3f4f6;
      }
      .toggle-checkbox:checked + .toggle-label {
        background-color: #111827;
      }
      .dark .toggle-checkbox:checked + .toggle-label {
        background-color: #f3f4f6;
      }

      /* Progress Bar Animation */
      @keyframes progress {
        0% { width: 0%; }
        100% { width: 100%; }
      }
      .animate-progress {
        animation: progress 2s ease-in-out infinite;
      }

      /* Rotate decoration animation - from sr-message-maker */
      @keyframes rotateDecoration {
        from { transform: rotate(0deg); }
        to { transform: rotate(-360deg); }
      }
      .rotate-decoration {
        animation: rotateDecoration 60s linear infinite;
      }

      /* Content overlay enhanced blur */
      .content-overlay-blur {
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        box-shadow: 0 0 20px 0px rgba(0, 0, 0, 0.5);
      }
    </style>
</head>
  <body class="text-mono-900 dark:text-mono-50 antialiased transition-colors duration-300">
    <div id="root"></div>

    <script src="app.js"></script>
  </body>
</html>
